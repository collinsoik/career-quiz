services:
  pathfinder-server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "3007:3007"
    environment:
      - NODE_ENV=production
      - PORT=3007
      - CORS_ORIGIN=https://careerquiz-nine.vercel.app,https://pathfinder.collinsoik.dev,http://localhost:3000
      - DB_PATH=/app/data/pathfinder.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3007/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
